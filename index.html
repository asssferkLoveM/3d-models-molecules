<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Молекулы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; overflow: hidden; }
    .sidebar {
      position: absolute;
      left: 0; top: 0;
      width: 320px;
      height: 100vh;
      background: #0f172a;
      border-right: 2px solid #334155;
      z-index: 10;
      overflow-y: auto;
    }
    .viewer-wrapper {
      position: absolute;
      left: 320px; top: 0;
      width: calc(100% - 320px);
      height: 100vh;
      background: #0f172a;
    }
    model-viewer {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>

  <!-- Левая панель -->
  <div class="sidebar">
    <div class="p-6 border-b border-slate-700">
      <h1 class="text-2xl font-bold text-blue-400">3D Молекулы</h1>
      <p class="text-sm text-slate-400 mt-1">Выберите молекулу</p>
    </div>
    <div id="tabs" class="p-4 space-y-2"></div>
  </div>

  <!-- 3D область -->
  <div class="viewer-wrapper">
    <model-viewer 
      id="viewer"
      src="H2O.glb"
      camera-controls
      auto-rotate
      auto-rotate-delay="1200"
      shadow-intensity="1"
      exposure="0.85"
      loading="eager"
    ></model-viewer>
  </div>

<script>
  const models = [
    { name: "H₂O",     file: "H2O.glb" },
    { name: "HCl",     file: "HCl.glb" },
    { name: "H₂S",     file: "H2S.glb" },
    { name: "NaOH",    file: "NaOH.glb" },
    { name: "CH₄",     file: "CH4.glb" },
    { name: "C₂H₆",    file: "C2H6.glb" },
    { name: "C₂H₄",    file: "C2H4.glb" },
    { name: "C₂H₂",    file: "C2H2.glb" },
    { name: "CH₃COOH", file: "CH3COOH.glb" },
    { name: "CH₃COONa",file: "CH3COONa.glb" }
  ];

  const tabsContainer = document.getElementById('tabs');
  const viewer = document.getElementById('viewer');

  models.forEach((mol, index) => {
    const btn = document.createElement('button');
    btn.className = `w-full text-left px-6 py-4 rounded-2xl text-lg font-medium transition-all 
                     hover:bg-slate-800 ${index === 0 ? 'bg-blue-600 text-white' : 'text-slate-300'}`;
    btn.textContent = mol.name;
    
    btn.onclick = () => {
      viewer.src = mol.file;
      
      // Обновляем активную кнопку
      document.querySelectorAll('#tabs button').forEach(b => 
        b.classList.remove('bg-blue-600', 'text-white')
      );
      btn.classList.add('bg-blue-600', 'text-white');
    };
    
    tabsContainer.appendChild(btn);
  });

  // Надёжное скрытие индикатора загрузки (если он вдруг появится)
  viewer.addEventListener('load', () => {
    console.log('Модель загружена успешно');
  });

  viewer.addEventListener('error', (e) => {
    console.error('Ошибка загрузки модели:', e);
  });
</script>

</body>
</html>

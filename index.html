<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Молекулы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; overflow: hidden; background: #0f172a; }
    
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 70px;
      background: #1e2937;
      border-bottom: 1px solid #334155;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
    }

    .menu-button {
      padding: 10px 18px;
      background: #334155;
      color: white;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .menu-button:hover { background: #475569; }

    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #1e2937;
      width: 90%;
      max-width: 380px;
      max-height: 85vh;
      border-radius: 20px;
      overflow: hidden;
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid #334155;
      font-size: 20px;
      font-weight: bold;
      color: #60a5fa;
    }

    .model-list {
      max-height: 60vh;
      overflow-y: auto;
      padding: 10px;
    }

    .model-item {
      width: 100%;
      padding: 16px 20px;
      text-align: left;
      font-size: 18px;
      border-radius: 12px;
      margin-bottom: 6px;
      transition: all 0.2s;
    }
    .model-item:hover { background: #334155; }
    .model-item.active { background: #3b82f6; color: white; }

    model-viewer {
      width: 100vw;
      height: calc(100vh - 70px);
      margin-top: 70px;
    }
  </style>
</head>
<body>

  <!-- Верхняя панель -->
  <div class="header">
    <div onclick="toggleMenu()" class="menu-button">
      📋 Выбрать молекулу
    </div>
    <div id="current-name" class="text-white text-xl font-semibold"></div>
  </div>

  <!-- 3D модель -->
  <model-viewer 
    id="viewer"
    src="H2O.glb"
    camera-controls
    auto-rotate
    auto-rotate-delay="1500"
    shadow-intensity="1"
    exposure="0.8"
    loading="eager"
  ></model-viewer>

  <!-- Модальное окно со списком -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">Выберите молекулу</div>
      <div id="model-list" class="model-list"></div>
    </div>
  </div>

<script>
  const models = [
    { name: "H₂O",     file: "H2O.glb" },
    { name: "HCl",     file: "HCl.glb" },
    { name: "H₂S",     file: "H2S.glb" },
    { name: "NaOH",    file: "NaOH.glb" },
    { name: "CH₄",     file: "CH4.glb" },
    { name: "C₂H₆",    file: "C2H6.glb" },
    { name: "C₂H₄",    file: "C2H4.glb" },
    { name: "C₂H₂",    file: "C2H2.glb" },
    { name: "CH₃COOH", file: "CH3COOH.glb" },
    { name: "CH₃COONa",file: "CH3COONa.glb" }
  ];

  const viewer = document.getElementById('viewer');
  const modal = document.getElementById('modal');
  const currentName = document.getElementById('current-name');
  const modelList = document.getElementById('model-list');

  // Создаём список молекул
  models.forEach((mol, index) => {
    const item = document.createElement('div');
    item.className = `model-item ${index === 0 ? 'active' : ''}`;
    item.textContent = mol.name;
    
    item.onclick = () => {
      viewer.src = mol.file;
      currentName.textContent = mol.name;
      
      // Обновляем активный элемент
      document.querySelectorAll('.model-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      
      closeMenu();
    };
    
    modelList.appendChild(item);
  });

  // Показать/скрыть меню
  function toggleMenu() {
    modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
  }

  function closeMenu() {
    modal.style.display = 'none';
  }

  // Закрытие меню при клике вне списка
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeMenu();
  });

  // Устанавливаем начальное название
  currentName.textContent = "H₂O";

  // Дополнительно для лучшей работы на телефоне
  viewer.addEventListener('load', () => {
    console.log('Модель успешно загружена');
  });
</script>

</body>
</html>

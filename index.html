<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Молекулы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; overflow: hidden; background: #0f172a; }
    
    .header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 70px;
      background: #1e2937;
      border-bottom: 1px solid #334155;
      z-index: 20;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 15px;
    }

    .menu-button {
      padding: 10px 18px;
      background: #334155;
      color: white;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .menu-button:hover { background: #475569; }

    .current-name {
      font-size: 22px;
      font-weight: 700;
      color: #60a5fa;
      flex: 1;
    }

    .info-panel {
      max-width: 340px;
      font-size: 16.5px;
      line-height: 1.5;
      color: #cbd5e1;
      text-align: right;
      background: rgba(30, 41, 55, 0.9);
      padding: 14px 18px;        /* увеличил отступы внутри */
      border-radius: 12px;
      border: 1px solid #475569;
      margin-top: 12px;          /* ← СДЕЛАЛ БОЛЬШЕ ОТСТУПА СВЕРХУ */
    }

    model-viewer {
      width: 100vw;
      height: calc(100vh - 70px);
      margin-top: 70px;
    }

    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #1e2937;
      width: 90%;
      max-width: 380px;
      max-height: 85vh;
      border-radius: 20px;
      overflow: hidden;
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid #334155;
      font-size: 20px;
      font-weight: bold;
      color: #60a5fa;
    }

    .model-list {
      max-height: 60vh;
      overflow-y: auto;
      padding: 10px;
    }

    .model-item {
      width: 100%;
      padding: 16px 20px;
      text-align: left;
      font-size: 18px;
      border-radius: 12px;
      margin-bottom: 6px;
      transition: all 0.2s;
    }
    .model-item:hover { background: #334155; }
    .model-item.active { background: #3b82f6; color: white; }
  </style>
</head>
<body>

  <!-- Верхняя панель -->
  <div class="header">
    <div onclick="toggleMenu()" class="menu-button">
      📋 Выбрать молекулу
    </div>
    
    <div id="current-name" class="current-name">H₂O</div>
    
    <!-- Информационная панель справа -->
    <div id="info-panel" class="info-panel">
      Вода — самое распространённое вещество на Земле. Состоит из двух атомов водорода и одного атома кислорода.
    </div>
  </div>

  <!-- 3D модель -->
  <model-viewer 
    id="viewer"
    src="H2O.glb"
    camera-controls
    auto-rotate
    auto-rotate-delay="1500"
    shadow-intensity="1"
    exposure="0.8"
    loading="eager"
  ></model-viewer>

  <!-- Модальное окно со списком -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">Выберите молекулу</div>
      <div id="model-list" class="model-list"></div>
    </div>
  </div>

<script>
  const models = [
    { name: "H₂O",     file: "H2O.glb", info: "Вода — самое распространённое вещество на Земле. Состоит из двух атомов водорода и одного атома кислорода." },
    { name: "HCl",     file: "HCl.glb", info: "Хлороводород — бесцветный едкий газ с резким запахом. В воде образует соляную кислоту." },
    { name: "H₂S",     file: "H2S.glb", info: "Сероводород — газ с характерным запахом тухлых яиц. Очень токсичен даже в малых концентрациях." },
    { name: "NaOH",    file: "NaOH.glb", info: "Гидроксид натрия (каустическая сода) — сильное основание. Используется в производстве мыла и бумаги." },
    { name: "CH₄",     file: "CH4.glb", info: "Метан — простейший углеводород. Основной компонент природного газа." },
    { name: "C₂H₆",    file: "C2H6.glb", info: "Этан — насыщенный углеводород. Содержится в природном газе и используется как топливо." },
    { name: "C₂H₄",    file: "C2H4.glb", info: "Этилен (этен) — важнейший алкен. Используется для производства полиэтилена." },
    { name: "C₂H₂",    file: "C2H2.glb", info: "Ацетилен — газ, применяемый в сварке (кислородно-ацетиленовое пламя)." },
    { name: "CH₃COOH", file: "CH3COOH.glb", info: "Уксусная кислота — слабая органическая кислота. Основной компонент уксуса." },
    { name: "CH₃COONa",file: "CH3COONa.glb", info: "Ацетат натрия — соль уксусной кислоты. Используется в грелках и пищевой промышленности." }
  ];

  const viewer = document.getElementById('viewer');
  const modal = document.getElementById('modal');
  const currentName = document.getElementById('current-name');
  const infoPanel = document.getElementById('info-panel');
  const modelList = document.getElementById('model-list');

  models.forEach((mol, index) => {
    const item = document.createElement('div');
    item.className = `model-item ${index === 0 ? 'active' : ''}`;
    item.textContent = mol.name;
    
    item.onclick = () => {
      viewer.src = mol.file;
      currentName.textContent = mol.name;
      infoPanel.textContent = mol.info;
      
      document.querySelectorAll('.model-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      closeMenu();
    };
    modelList.appendChild(item);
  });

  function toggleMenu() {
    modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
  }

  function closeMenu() {
    modal.style.display = 'none';
  }

  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeMenu();
  });

  currentName.textContent = "H₂O";
  infoPanel.textContent = models[0].info;
</script>

</body>
</html>
